services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: misnote
      POSTGRES_USER: misnote
      POSTGRES_PASSWORD: misnote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U misnote"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://misnote:misnote@db:5432/misnote
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
