<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>復習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:     #1E293B;
      --navy-lt:  #F1F5F9;
      --amber:    #D97706;
      --amber-dk: #B45309;
      --amber-lt: #FFFBEB;
      --red:      #B91C1C;
      --red-lt:   #FEF2F2;
      --green:    #065F46;
      --green-lt: #ECFDF5;
      --border:   #E2E8F0;
      --bg:       #FAFAFA;
      --surface:  #FFFFFF;
      --text:     #0F172A;
      --muted:    #64748B;
      --sidebar-w: 240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; font-size: 14px; }
    *:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 4px; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: var(--navy); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
    .logo { padding: 26px 24px 22px; font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.05em; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo span { color: var(--amber); }
    .nav { padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.5); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
    .nav-item.active { background: rgba(217,119,6,0.2); color: #fff; border-left: 3px solid var(--amber); padding-left: 11px; }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .progress-label { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .progress-bar-wrap { background: rgba(255,255,255,0.12); border-radius: 99px; height: 5px; margin-bottom: 6px; }
    .progress-bar-fill { background: var(--amber); border-radius: 99px; height: 5px; width: 40%; }
    .progress-stat { font-size: 12px; color: rgba(255,255,255,0.45); }
    .progress-stat strong { color: rgba(255,255,255,0.8); }

    /* MAIN */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 36px; display: flex; align-items: center; gap: 12px; }
    .back-btn { display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--amber); cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.15s; }
    .back-btn:hover { background: var(--amber-lt); }
    .header h1 { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
    .header-right { margin-left: auto; font-size: 12px; color: var(--muted); }

    /* CONTENT */
    .content { padding: 40px 36px; max-width: 760px; display: flex; flex-direction: column; gap: 20px; }

    /* Meta row */
    .meta-row { display: flex; align-items: center; gap: 10px; }
    .subject-chip { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--navy); background: var(--navy-lt); padding: 3px 10px; border-radius: 4px; }
    .sep { color: #CBD5E1; }
    .wrong-count { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--red); font-weight: 700; }

    /* Question card */
    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .card-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
    .question-text { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 500; line-height: 1.75; color: var(--text); }

    /* Answer section */
    .answer-hidden { width: 100%; padding: 16px; background: var(--navy-lt); border: 1px dashed #CBD5E1; border-radius: 8px; font-size: 14px; font-weight: 700; color: var(--muted); cursor: pointer; text-align: center; letter-spacing: 0.02em; transition: background 0.15s, border-color 0.15s; }
    .answer-hidden:hover { background: #E8EEF7; border-color: var(--navy); color: var(--navy); }

    .answer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: none; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .answer-card.visible { display: block; }
    .answer-block { padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .answer-block:last-child { border-bottom: none; }
    .answer-text { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 700; color: var(--navy); line-height: 1.6; }
    .memo-text { font-size: 14px; color: var(--text); line-height: 1.75; }
    .memo-empty { font-size: 13px; color: #CBD5E1; }

    /* Judge buttons */
    .judge-row { display: flex; gap: 12px; }
    .btn-correct { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: opacity 0.15s; }
    .btn-correct:hover { opacity: 0.88; }
    .btn-wrong { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: opacity 0.15s; }
    .btn-wrong:hover { opacity: 0.88; }

    /* Memo section (shown after 不正解) */
    .memo-section { border: 1px solid var(--amber); border-radius: 8px; overflow: hidden; display: none; }
    .memo-section.visible { display: block; }
    .memo-section-header { background: var(--amber); padding: 12px 20px; display: flex; align-items: center; gap: 8px; }
    .memo-section-title { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.03em; }
    .memo-section-body { background: var(--amber-lt); padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
    .field textarea, .field input[type="date"] { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; background: var(--surface); color: var(--text); resize: vertical; line-height: 1.7; transition: border-color 0.15s, box-shadow 0.15s; }
    .field textarea:focus, .field input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-lt); }

    .memo-actions { display: flex; gap: 10px; padding-top: 4px; }
    .save-btn { background: var(--amber); color: #fff; border: none; border-radius: 6px; padding: 11px 28px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .save-btn:hover { background: var(--amber-dk); }
    .skip-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; padding: 11px 16px; transition: color 0.15s; }
    .skip-btn:hover { color: var(--text); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">mis<span>note</span></div>
    <nav class="nav">
      <div class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        ホーム
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        苦手問題
      </div>
      <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        科目管理
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="progress-label">克服率</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
      <div class="progress-stat"><strong>8</strong> 問克服 / 全 20 問</div>
    </div>
  </aside>

  <div class="main">
    <div class="header">
      <button class="back-btn" aria-label="戻る">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1>復習</h1>
      <span class="header-right">2 / 3問</span>
    </div>

    <div class="content">

      <!-- 問題メタ情報 -->
      <div class="meta-row">
        <span class="subject-chip">数学 › 二次方程式</span>
        <span class="sep">·</span>
        <span class="wrong-count">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          3回間違い
        </span>
      </div>

      <!-- 問題文 -->
      <div class="question-card">
        <div class="card-label">問題</div>
        <div class="question-text">次の方程式を解け：2x² − 5x + 3 = 0</div>
      </div>

      <!-- 正解（初期状態：隠れている） -->
      <button class="answer-hidden" id="revealBtn" onclick="revealAnswer()">
        答えを見る
      </button>
      <div class="answer-card" id="answerCard">
        <div class="answer-block">
          <div class="card-label">正解</div>
          <div class="answer-text">x = 1, x = 3/2</div>
        </div>
        <div class="answer-block">
          <div class="card-label">間違えた理由</div>
          <div class="memo-text">符号を見落とした。解の公式の前に因数分解を試みること。</div>
        </div>
        <div class="answer-block">
          <div class="card-label">今回学んだこと</div>
          <div class="memo-text">ax²+bx+c=0 の形に整理してから因数分解すると符号ミスを防げる。</div>
        </div>
      </div>

      <!-- 正解 / 不正解 ボタン -->
      <div class="judge-row" id="judgeRow" style="display:none">
        <button class="btn-correct" onclick="window.location.reload()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          正解
        </button>
        <button class="btn-wrong" onclick="showMemo()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          不正解
        </button>
      </div>

      <!-- メモ編集（不正解時に展開） -->
      <div class="memo-section" id="memoSection">
        <div class="memo-section-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span class="memo-section-title">メモを更新する</span>
        </div>
        <div class="memo-section-body">
          <div class="field">
            <label>間違えた理由</label>
            <textarea rows="2" placeholder="例：符号のミスに注意">符号を見落とした。解の公式の前に因数分解を試みること。</textarea>
          </div>
          <div class="field">
            <label>今回学んだこと</label>
            <textarea rows="2" placeholder="例：移項するとき符号が反転することを覚える">ax²+bx+c=0 の形に整理してから因数分解すると符号ミスを防げる。</textarea>
          </div>
          <div class="field" style="max-width: 200px;">
            <label>次の復習日</label>
            <input type="date" value="2026-07-07" />
          </div>
          <div class="memo-actions">
            <button class="save-btn">保存してホームへ</button>
            <button class="skip-btn">メモをスキップ</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function revealAnswer() {
      document.getElementById('revealBtn').style.display = 'none';
      document.getElementById('answerCard').classList.add('visible');
      document.getElementById('judgeRow').style.display = 'flex';
    }
    function showMemo() {
      document.getElementById('judgeRow').style.display = 'none';
      document.getElementById('memoSection').classList.add('visible');
    }
  </script>
</body>
</html>
